<body>
    <h1>LETO_8_1_4</h1>

    <div class="buttons">
        <a href="album.html" class="button">Download album</a>

    </div>
    <audio id="bgm" src="LETO _ UTP-101MK2.mp3" autoplay loop></audio>
    <button id="player" onclick="toggleMusic()">⏸</button>

    <footer>
    © 2026 LETO_8_1_4
    </footer>
    
    <script>

        const audio = document.getElementById("bgm");
        const button = document.getElementById("player");

        function toggleMusic() {
            if (audio.paused) {
                audio.play();
                button.textContent = "⏸";
            } else {
                audio
                    audio.pause();
                    button.textContent = "▶";
            }
        }
    </script>
